defaults:
  warmup_requests: 30
  requests: 200
  concurrency: 10
  timeout_ms: 8000
  headers:
    Accept: text/html

scenarios:
  - id: atoll-home
    label: atoll homepage
    system: atoll
    url: http://127.0.0.1:8080/

  - id: wordpress-home
    label: WordPress homepage
    system: wordpress
    url: http://127.0.0.1:8081/

  - id: kirby-home
    label: Kirby homepage
    system: kirby
    url: http://127.0.0.1:8082/

  - id: grav-home
    label: Grav homepage
    system: grav
    url: http://127.0.0.1:8083/

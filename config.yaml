name: atoll-cms
base_url: 'http://localhost:8080'
environment: dev
timezone: Europe/Berlin
core:
  path: ../atoll-core
updater:
  channel: stable
  manifest_url: 'https://raw.githubusercontent.com/atoll-cms/atoll-updates/main/channels/stable.json'
  public_key: config/updater-public.pem
  require_signature: true
  timeout_seconds: 15
cache:
  enabled: true
  ttl: 3600
content:
  index:
    enabled: true
    driver: sqlite
    path: cache/content-index.sqlite
backup:
  schedule:
    enabled: false
    frequency: daily
    time: '03:00'
    weekday: 1
  targets:
    local:
      enabled: true
    s3:
      enabled: false
      endpoint: ''
      region: eu-central-1
      bucket: ''
      access_key: ''
      secret_key: ''
      prefix: atoll-backups
      path_style: true
    sftp:
      enabled: false
      host: ''
      port: 22
      username: ''
      password: ''
      private_key_file: ''
      public_key_file: ''
      passphrase: ''
      path: /backups/atoll
security:
  force_https: false
  hsts: false
  content_security_policy: "default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'"
  rate_limit:
    enabled: true
    requests: 120
    window_seconds: 60
  admin_ip_allowlist: {  }
  session:
    enabled: true
    ttl_minutes: 480
    secure_cookie: false
    same_site: Lax
    name: ATOLLSESSID
  password:
    min_length: 12
    require_uppercase: true
    require_lowercase: true
    require_digit: true
    require_special: true
  forms:
    anti_spam:
      min_seconds: 2
      timestamp_field: _atoll_ts
      require_timestamp: false
      max_links: 3
      blocked_phrases: []
      disposable_domains: []
      email_field: email
      require_user_agent: false
    captcha:
      enabled: false
      provider: turnstile
      site_key: ''
      secret: ''
      token_field: captcha_token
      minimum_score: 0.5
smtp:
  driver: mail
  host: localhost
  port: 587
  username: ''
  password: ''
  encryption: tls
  sendmail_path: ''
  from_email: noreply@example.com
  from_name: atoll-cms
  api:
    postmark:
      token: ''
      endpoint: 'https://api.postmarkapp.com/email'
    mailgun:
      domain: ''
      api_key: ''
      endpoint: ''
    ses:
      region: eu-central-1
      access_key: ''
      secret_key: ''
      session_token: ''
      endpoint: ''
seo:
  default_title: atoll-cms
  default_description: 'Modern flat-file CMS for PHP.'
  default_image: /assets/images/og-default.jpg
  robots: "User-agent: *\nAllow: /"
users:
  -
    username: admin
    password_hash: $2y$12$OgfET5ONHMhR4g1p31w2i.ce65RWxh4PTuiBH8V2/NitWxzRwTlsK
features:
  seo_core: true
  forms_core: true
  media_core: true
  backup_core: true
  redirects_core: true
appearance:
  theme: business
plugins:
  defaults_enabled: true
analytics:
  enabled: false
  provider: plausible
  domain: ''
  src: 'https://plausible.io/js/script.js'
  require_consent: true
i18n:
  locales:
    - de
    - en
  default_locale: de
  prefix_default_locale: false
forms_pro:
  webhooks: {  }

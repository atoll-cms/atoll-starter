honeypot: website
success_message: Thank you, we will be in touch.
anti_spam:
  min_seconds: 2
  timestamp_field: _atoll_ts
  max_links: 2

captcha:
  enabled: false
  provider: turnstile
  token_field: captcha_token
  # secret: env:ATOLL_TURNSTILE_SECRET

fields:
  name:
    type: text
    required: true
  email:
    type: email
    required: true
  message:
    type: text
    required: true

mail:
  to: admin@example.com
  subject: New contact request
  template: |
    Name: {{name}}
    E-Mail: {{email}}

    Message:
    {{message}}

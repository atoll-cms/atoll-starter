name: Shop
slug_from: filename
sort: title asc

schema:
  title:
    type: string
    required: true
  price:
    type: number
    required: true
  currency:
    type: string
    default: EUR
  sku:
    type: string
  stock:
    type: number
  excerpt:
    type: text
    max_length: 280
  image:
    type: image
  draft:
    type: boolean
    default: false

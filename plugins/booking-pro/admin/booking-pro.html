<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Booking Pro</title>
    <style>
      :root {
        --bg: #0b1416;
        --surface: #111f23;
        --surface-2: #192c31;
        --line: #243a40;
        --text: #ecf2f0;
        --muted: #8aa3a8;
        --brand: #f59e0b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 1rem;
        font: 14px/1.45 Outfit, -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 12px;
      }
      .card h2 {
        margin: 0;
        padding: 0.9rem 1rem;
        border-bottom: 1px solid var(--line);
        font-size: 0.95rem;
      }
      .body { padding: 1rem; }
      .row {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 0.8rem;
        margin-bottom: 0.7rem;
        align-items: center;
      }
      .row label { color: var(--muted); font-size: 0.8rem; }
      input, select {
        width: 100%;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--surface-2);
        color: var(--text);
        padding: 0.45rem 0.55rem;
        font: inherit;
      }
      button {
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--surface-2);
        color: var(--text);
        padding: 0.45rem 0.75rem;
        font: inherit;
        cursor: pointer;
      }
      button.primary {
        background: var(--brand);
        border-color: #fbbf24;
        color: #0b1416;
        font-weight: 600;
      }
      .toolbar {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
      }
      .slot-list {
        display: grid;
        gap: 0.45rem;
        grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
      }
      .slot {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface-2);
        padding: 0.4rem 0.5rem;
        font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 0.78rem;
        text-align: center;
      }
      .slot.empty {
        color: var(--muted);
        text-align: left;
        grid-column: 1 / -1;
      }
      table { width: 100%; border-collapse: collapse; }
      th, td {
        border-bottom: 1px solid var(--line);
        padding: 0.45rem;
        text-align: left;
        vertical-align: top;
      }
      th { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; }
      .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .notice { padding: 0.55rem 0.65rem; border-radius: 8px; margin-bottom: 0.8rem; border: 1px solid var(--line); }
      .notice.ok { background: rgba(34, 197, 94, 0.1); border-color: rgba(34, 197, 94, 0.4); color: #86efac; }
      .notice.err { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.4); color: #fda4af; }
      .small { color: var(--muted); font-size: 0.82rem; }
      .actions { display: flex; gap: 0.35rem; flex-wrap: wrap; }
      .badge { border-radius: 999px; padding: 0.1rem 0.5rem; border: 1px solid var(--line); font-size: 0.72rem; }
      .badge.pending { color: #fbbf24; border-color: rgba(251, 191, 36, 0.5); }
      .badge.confirmed { color: #86efac; border-color: rgba(134, 239, 172, 0.5); }
      .badge.cancelled { color: #fda4af; border-color: rgba(253, 164, 175, 0.5); }
      .badge.completed { color: #93c5fd; border-color: rgba(147, 197, 253, 0.5); }
    </style>
  </head>
  <body>
    <div class="grid">
      <div class="card">
        <h2>Calendar and Slots</h2>
        <div class="body">
          <div id="notice"></div>
          <div class="row">
            <label for="slot-date">Date</label>
            <input id="slot-date" type="date">
          </div>
          <div class="row">
            <label for="slot-service">Service</label>
            <select id="slot-service"></select>
          </div>
          <div class="toolbar" style="margin-bottom: 0.8rem;">
            <button id="load-slots" type="button">Load slots</button>
            <a id="ical-link" href="/booking-pro/ical" target="_blank" rel="noreferrer" class="small">Open iCal feed</a>
          </div>
          <div id="slots" class="slot-list"></div>
        </div>
      </div>

      <div class="card">
        <h2>Bookings</h2>
        <div class="body">
          <div class="toolbar" style="margin-bottom: 0.8rem; justify-content: space-between;">
            <div class="toolbar">
              <select id="filter-status">
                <option value="">all statuses</option>
                <option value="pending">pending</option>
                <option value="confirmed">confirmed</option>
                <option value="cancelled">cancelled</option>
                <option value="completed">completed</option>
              </select>
              <input id="filter-from" type="date">
              <input id="filter-to" type="date">
            </div>
            <button id="reload-bookings" type="button">Reload</button>
          </div>

          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>When</th>
                <th>Service</th>
                <th>Customer</th>
                <th>Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="bookings-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script defer src="/plugins/booking-pro/admin/booking-pro.js"></script>
  </body>
</html>

<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Members</title>
    <style>
      :root {
        --bg: #0b1416;
        --surface: #111f23;
        --surface-2: #192c31;
        --line: #243a40;
        --text: #ecf2f0;
        --muted: #8aa3a8;
        --brand: #f59e0b;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 1rem;
        font: 14px/1.45 Outfit, -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--text);
      }
      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 12px;
        margin-bottom: 1rem;
      }
      .card h2 {
        margin: 0;
        padding: 0.9rem 1rem;
        border-bottom: 1px solid var(--line);
        font-size: 0.95rem;
      }
      .body { padding: 1rem; }
      .toolbar {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
      }
      .left { display: flex; gap: 0.5rem; align-items: center; }
      .right { display: flex; gap: 0.5rem; align-items: center; }
      .row {
        display: grid;
        grid-template-columns: 200px 1fr;
        gap: 0.8rem;
        margin-bottom: 0.65rem;
        align-items: center;
      }
      .row label { color: var(--muted); font-size: 0.8rem; }
      input, select {
        width: 100%;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--surface-2);
        color: var(--text);
        padding: 0.45rem 0.55rem;
        font: inherit;
      }
      button {
        border-radius: 8px;
        border: 1px solid var(--line);
        background: var(--surface-2);
        color: var(--text);
        padding: 0.45rem 0.75rem;
        font: inherit;
        cursor: pointer;
      }
      button.primary {
        background: var(--brand);
        border-color: #fbbf24;
        color: #0b1416;
        font-weight: 600;
      }
      table { width: 100%; border-collapse: collapse; }
      th, td {
        border-bottom: 1px solid var(--line);
        padding: 0.45rem;
        text-align: left;
        vertical-align: top;
      }
      th { color: var(--muted); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em; }
      .mono { font-family: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
      .notice { padding: 0.55rem 0.65rem; border-radius: 8px; margin-bottom: 0.8rem; border: 1px solid var(--line); }
      .notice.ok { background: rgba(34, 197, 94, 0.1); border-color: rgba(34, 197, 94, 0.4); color: #86efac; }
      .notice.err { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.4); color: #fda4af; }
      .muted { color: var(--muted); font-size: 0.82rem; }
      .actions { display: flex; gap: 0.35rem; flex-wrap: wrap; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Members</h2>
      <div class="body">
        <div id="notice"></div>
        <form id="create-form">
          <div class="row">
            <label for="create-email">E-Mail</label>
            <input id="create-email" name="email" type="email" required>
          </div>
          <div class="row">
            <label for="create-name">Name</label>
            <input id="create-name" name="name" type="text">
          </div>
          <div class="row">
            <label for="create-role">Rolle</label>
            <select id="create-role" name="role">
              <option value="member">member</option>
              <option value="editor">editor</option>
              <option value="admin">admin</option>
            </select>
          </div>
          <div class="row">
            <label for="create-password">Passwort</label>
            <input id="create-password" name="password" type="password" required>
          </div>
          <div class="toolbar">
            <div class="left muted">Neue Accounts werden sofort aktiv angelegt.</div>
            <div class="right">
              <button id="create-submit" class="primary" type="submit">Mitglied anlegen</button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div class="card">
      <h2>Bestehende Mitglieder</h2>
      <div class="body">
        <div class="toolbar" style="margin-bottom:0.8rem;">
          <div class="left muted">Verwalte Rollen, Status und Passwort-Resets.</div>
          <div class="right">
            <button id="reload" type="button">Neu laden</button>
          </div>
        </div>

        <table>
          <thead>
            <tr>
              <th>E-Mail</th>
              <th>Name</th>
              <th>Rolle</th>
              <th>Status</th>
              <th>Zuletzt Login</th>
              <th>Aktionen</th>
            </tr>
          </thead>
          <tbody id="members-body"></tbody>
        </table>
      </div>
    </div>

    <script defer src="/plugins/members/admin/members.js"></script>
  </body>
</html>
